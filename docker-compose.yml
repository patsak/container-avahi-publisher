services:
  avahi-publisher:
    build: .
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket

# Label reference:
#
#   mdns.host: myapp
#     → CNAME myapp.local → <host mDNS FQDN>
#       resolves to the host IP via the host's existing A record
#       multiple containers may share the same alias without collision
#
#   mdns.host: myapp, myapp-alias
#     → multiple CNAME aliases, comma-separated
#
#   mdns.host.container: myapp-internal
#     → A record myapp-internal.local → container IP
#
#   Both labels can be set on the same container simultaneously.
#
# Example:
#
#   myapp:
#     image: nginx
#     ports:
#       - "8080:80"
#     labels:
#       mdns.host: myapp, myapp-alias         # CNAME → host
#       mdns.host.container: myapp-c, myapp2  # A record → container IP
